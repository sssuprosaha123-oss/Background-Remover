<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQZFiaVMJ1CmUJVuRgOkS7Fl0dI65A0M73tIg&s">
    <title>Background Remover</title>
</head>
<body>

<div class="container">
    <h2>Background Remover<h2>
    <p class="subtitle">Remove Background Of Any Picture In Seconds</p>

    <div class="drop-zone" id="dropZone" onclick="document.getElementById('imageInput').click()">
        <span style="font-size: 40px;">📸</span>
        <p id="fileName">Drag Or Drop Here Picture</p>
        <input type="file" id="imageInput" accept="image/*">
    </div>
    
    <div class="btn-group">
        <button class="btn-process" onclick="removeBackground()">Remove Background</button>
        <button class="btn-cancel" onclick="resetAll()">Cancel</button>
    </div>
    
    <div class="loader" id="loader"></div>
    <p id="status" style="margin-top: 15px; font-size: 14px; font-weight: 500;"></p>
    <div id="outputImage"></div>
</div>

<script src="script.js">

</script>

</body>
</html>
